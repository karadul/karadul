name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        go-version: ['1.24', '1.25']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Run tests
        run: go test -race -count=1 ./...

  web-build:
    name: Build Web UI
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: cd web && npm ci

      - name: Build
        run: |
          cd web && npm run build
          rm -rf internal/web/dist/*
          cp -r web/dist/* internal/web/dist/

      - name: Upload web dist
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: internal/web/dist/

  build:
    name: Build Release Binaries
    needs: [test, web-build]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: linux
            goarch: arm
            suffix: linux-armv7
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64.exe
          - goos: windows
            goarch: arm64
            suffix: windows-arm64.exe
          - goos: windows
            goarch: '386'
            suffix: windows-x86.exe
          - goos: freebsd
            goarch: amd64
            suffix: freebsd-amd64
          - goos: openbsd
            goarch: amd64
            suffix: openbsd-amd64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download web dist
        uses: actions/download-artifact@v8
        with:
          name: web-dist
          path: internal/web/dist/

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o karadul-${{ matrix.suffix }} ./cmd/karadul

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: karadul-${{ matrix.suffix }}
          path: karadul-${{ matrix.suffix }}

  checksums:
    name: Generate Checksums
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum karadul-* > checksums.txt
          cat checksums.txt

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: artifacts/checksums.txt

  release:
    name: Create Release
    needs: [build, checksums]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'rc') }}
          generate_release_notes: true
          body: |
            ## Installation

            ### Linux/macOS
            ```bash
            # Download the appropriate binary for your architecture
            curl -LO https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/karadul-linux-amd64
            chmod +x karadul-linux-amd64
            sudo mv karadul-linux-amd64 /usr/local/bin/karadul
            ```

            ### macOS (Homebrew)
            ```bash
            brew tap karadul/karadul
            brew install karadul
            ```

            ### Windows
            Download the `.exe` file and place it in your PATH, or use:
            ```powershell
            # PowerShell
            Invoke-WebRequest -Uri "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/karadul-windows-amd64.exe" -OutFile "karadul.exe"
            ```

            ### Docker
            ```bash
            docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ```

            ## Quick Start

            1. **Start a coordination server:**
               ```bash
               karadul server --addr=:8080
               ```

            2. **Create an auth key:**
               ```bash
               karadul auth create-key
               ```

            3. **Join a node to the mesh:**
               ```bash
               karadul up --server=http://your-server:8080 --auth-key=<key>
               ```

            See [README.md](https://github.com/${{ github.repository }}#readme) for full documentation.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
