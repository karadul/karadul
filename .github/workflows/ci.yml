name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        go-version: ['1.24', '1.25']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Cache Go modules
        uses: actions/cache@v5
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Run go vet
        run: go vet ./...

      - name: Run tests
        run: go test -v -count=1 ./...

      - name: Run tests with race detector
        run: go test -race -count=1 ./...

  web-test:
    name: Web Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run lint
        run: npx eslint src/ --max-warnings 3

      - name: Run TypeScript check
        run: npx tsc --noEmit

      - name: Run tests
        run: npx vitest run

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Run tests with coverage
        run: |
          go test -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.out
          fail_ci_if_error: false

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build binary
        run: go build -v ./cmd/karadul

      - name: Build all platforms
        run: |
          # Linux
          GOOS=linux GOARCH=amd64 go build -o karadul-linux-amd64 ./cmd/karadul
          GOOS=linux GOARCH=arm64 go build -o karadul-linux-arm64 ./cmd/karadul
          GOOS=linux GOARCH=arm go build -o karadul-linux-armv7 ./cmd/karadul
          # macOS
          GOOS=darwin GOARCH=amd64 go build -o karadul-darwin-amd64 ./cmd/karadul
          GOOS=darwin GOARCH=arm64 go build -o karadul-darwin-arm64 ./cmd/karadul
          # Windows
          GOOS=windows GOARCH=amd64 go build -o karadul-windows-amd64.exe ./cmd/karadul
          GOOS=windows GOARCH=arm64 go build -o karadul-windows-arm64.exe ./cmd/karadul
          GOOS=windows GOARCH=386 go build -o karadul-windows-x86.exe ./cmd/karadul
          # BSD (best effort - some features not implemented)
          GOOS=freebsd GOARCH=amd64 go build -o karadul-freebsd-amd64 ./cmd/karadul || true
          GOOS=openbsd GOARCH=amd64 go build -o karadul-openbsd-amd64 ./cmd/karadul || true

      - name: Check build artifacts
        run: ls -la karadul-* 2>/dev/null || echo "Some BSD builds may be stubs"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  vulncheck:
    name: Vulnerability Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...
